version: '3.8'

services:
  # Database
  postgres:
    image: postgres:15-alpine
    container_name: rdam_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rdam_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: rdam_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Object Storage
  minio:
    image: minio/minio
    container_name: rdam_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Create default bucket
  minio-create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/rdam-documents;
      /usr/bin/mc anonymous set none myminio/rdam-documents;
      exit 0;
      "

  # API (Development)
  # Uncomment when API is ready to run
  # api:
  #   build:
  #     context: ../
  #     dockerfile: infrastructure/Dockerfile.api
  #   container_name: rdam_api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/rdam_db
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     - postgres
  #     - redis
  #   volumes:
  #     - ../Backend:/usr/src/app

volumes:
  postgres_data:
  redis_data:
  minio_data:
